program: train_busi_sweep.py
method: bayes
metric:
  goal: maximize
  name: fold0_test_acc

# Bayesian optimization over the 3 unspecified paper hyperparameters.
# Base config (V4): alpha=0.01, beta=0.1, tau=0.2, wd=1e-4, lr=1e-3
parameters:
  alpha:
    distribution: log_uniform_values
    min: 0.001
    max: 0.3

  beta:
    distribution: log_uniform_values
    min: 0.02
    max: 0.8

  temperature:
    values: [0.05, 0.07, 0.1, 0.15, 0.2, 0.3, 0.5]

  weight_decay:
    values: [0.0, 1.0e-5, 1.0e-4, 5.0e-4]

  lr:
    values: [5.0e-4, 1.0e-3, 2.0e-3]
