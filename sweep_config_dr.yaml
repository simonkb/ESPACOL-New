program: train_dr_sweep.py
method: bayes
metric:
  goal: maximize
  name: running_best_val_acc

# Hyperband: at epoch 10 kill bottom 50%, at epoch 20 kill bottom 75%, etc.
# Trials heading to 83%+ should be clearly separating by epoch 10.
early_terminate:
  type: hyperband
  min_iter: 10
  eta: 2

# Target region based on analysis:
#   - tau=1.0:  max SCOLw logit = (1+4)/1.0 = 5 → exp(5)=148,
#               gradient balanced across all 5 class pairs.
#   - tau=0.5 gave exp(8)=3000 → class-0 vs class-4 monopolised the gradient,
#               SCOLw never converged (stuck at ~24-31 across all trials).
#   - beta=0.05–0.15 with tau=1.0 gives SCOLw ~50–75% of total loss — the
#               same healthy balance that drove BUSI to 91%.
#   - lr_patience=8–10 gives the 5-class contrastive landscape more time to
#               settle before the LR drops.
parameters:
  alpha:
    distribution: log_uniform_values
    min: 0.003
    max: 0.2

  beta:
    distribution: log_uniform_values
    min: 0.003
    max: 0.08

  temperature:
    values: [0.5, 0.7, 1.0]

  lr_patience:
    values: [8, 10, 12]

  weight_decay:
    values: [1.0e-6, 1.0e-5, 3.0e-5]

  lr:
    values: [5.0e-5, 1.0e-4, 2.0e-4]

  batch_size:
    values: [24, 32, 40]

  early_stop_patience:
    values: [20, 30]

  epochs:
    values: [100, 125]
